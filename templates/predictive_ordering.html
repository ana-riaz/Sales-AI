<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Reordering - Smart Sales Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f1f5f9;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #1e293b;
        }

        /* ── Nav ── */
        .nav-header { background: #1e293b; flex-shrink: 0; }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            height: 48px;
        }
        .nav-brand { font-size: 0.9rem; font-weight: 600; color: white; }
        .nav-links { display: flex; gap: 2px; }
        .nav-link {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 5px;
            font-size: 0.8rem;
            transition: all 0.15s;
        }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.08); }
        .nav-link.active { color: white; background: rgba(255,255,255,0.15); }

        /* ── Control Bar ── */
        .control-bar { background: white; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
        .control-bar-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 54px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .page-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            margin-right: 4px;
        }
        .ctrl-divider { width: 1px; height: 20px; background: #e2e8f0; }
        #customerId {
            padding: 7px 11px;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
            font-size: 0.85rem;
            width: 220px;
            color: #1e293b;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #customerId:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .demo-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #64748b;
            white-space: nowrap;
            cursor: pointer;
        }
        .ctrl-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 7px 16px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .ctrl-btn:hover { background: #1d4ed8; }
        .ctrl-btn:disabled { opacity: 0.6; cursor: not-allowed; background: #2563eb; }
        .ctrl-btn-secondary {
            background: white;
            color: #16a34a;
            border: 1px solid #16a34a;
            padding: 6px 14px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .ctrl-btn-secondary:hover { background: #f0fdf4; }

        /* ── Main Content ── */
        .main-content { flex: 1; overflow: hidden; display: flex; }
        .content-inner {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 16px 24px;
            height: 100%;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ── Stat row ── */
        .stats { display: flex; gap: 12px; flex-shrink: 0; }
        .stat-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px 18px;
            flex: 1;
            border-left: 4px solid #2563eb;
        }
        .stat-number { font-size: 1.6rem; font-weight: 700; color: #1e293b; line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; }

        /* ── Customer info strip ── */
        .customer-info {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            flex-shrink: 0;
            border-left: 4px solid #2563eb;
        }
        .customer-info h3 { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; align-self: center; }
        .customer-info p { font-size: 0.85rem; color: #1e293b; }
        .customer-info p strong { color: #64748b; font-weight: 500; }

        /* ── Suggestions ── */
        .suggestions { display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .suggestions h3 { font-size: 0.85rem; font-weight: 600; color: #1e293b; margin-bottom: 4px; }
        .suggestion-category {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px;
        }
        .suggestion-category h4 { font-size: 0.8rem; font-weight: 600; color: #64748b; margin-bottom: 10px; }
        .suggestions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
        .suggestion-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 12px;
            border-left: 4px solid #e2e8f0;
        }
        .suggestion-card.high { border-left-color: #dc2626; }
        .suggestion-card.medium { border-left-color: #d97706; }
        .suggestion-card.low { border-left-color: #16a34a; }
        .suggestion-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
        .suggestion-message { font-size: 0.85rem; font-weight: 600; color: #1e293b; line-height: 1.3; }
        .suggestion-type {
            background: #2563eb;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .suggestion-reason { font-size: 0.78rem; color: #64748b; line-height: 1.4; }

        /* ── Patterns section ── */
        .patterns-section {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px;
            flex-shrink: 0;
        }
        .patterns-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .patterns-header h3 { font-size: 0.85rem; font-weight: 600; color: #1e293b; }
        .patterns-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .patterns-table th {
            background: #f8fafc;
            color: #64748b;
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 2px solid #e2e8f0;
        }
        .patterns-table td {
            padding: 9px 12px;
            border-bottom: 1px solid #f1f5f9;
            color: #1e293b;
        }
        .patterns-table tr:last-child td { border-bottom: none; }
        .patterns-table tr:hover td { background: #f8fafc; }
        .item-code { font-weight: 600; color: #2563eb; }
        .item-name { color: #64748b; font-style: italic; }
        .interval-data, .quantity-data, .date-data { text-align: center; }
        .stock-data { text-align: center; font-weight: 600; }
        .stock-negative { color: #dc2626; }
        .stock-low { color: #dc2626; }
        .stock-medium { color: #d97706; }
        .stock-good { color: #16a34a; }
        .price-data { font-weight: 600; }

        /* Results wrapper */
        #results {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ── Loading / Error ── */
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        /* ── Empty state ── */
        .empty-prompt {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 60px 20px;
            text-align: center;
            color: #94a3b8;
        }
        .empty-prompt p { font-size: 0.875rem; line-height: 1.6; }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="nav-container">
        <div class="nav-brand">Smart Sales Assistant</div>
        <div class="nav-links">
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/" class="nav-link">Product Suggestions</a>
            <a href="/predictive" class="nav-link active">Smart Reordering</a>
            <a href="/upselling" class="nav-link">Bundle Deals</a>
        </div>
    </div>
</div>

<div class="control-bar">
    <div class="control-bar-inner">
        <span class="page-label">Smart Reordering</span>
        <div class="ctrl-divider"></div>
        <input type="text" id="customerId" placeholder="Customer code (e.g. C12345)" />
        <label class="demo-toggle">
            <input type="checkbox" id="demoModePredictive" checked />
            Demo Mode
        </label>
        <button class="ctrl-btn" onclick="getPredictions()">Get Reorder Suggestions</button>
    </div>
</div>

<div class="main-content">
    <div class="content-inner">

        <div id="loading" class="loading" style="display:none;">
            <p>Analyzing customer patterns...</p>
        </div>

        <div id="error" class="error" style="display:none;"></div>

        <div id="results" style="display:none;">
            <!-- Stats row -->
            <div id="stats" class="stats"></div>

            <!-- Customer info strip -->
            <div id="customerInfo" class="customer-info"></div>

            <!-- Suggestions -->
            <div id="suggestions" class="suggestions"></div>

            <!-- Patterns table -->
            <div id="patterns" class="patterns-section">
                <div class="patterns-header">
                    <h3>Order Patterns Analysis</h3>
                    <button class="ctrl-btn-secondary" onclick="exportPatternsToCSV()">Export CSV</button>
                </div>
                <div id="patternsContent"></div>
            </div>
        </div>

        <div id="emptyPrompt" class="empty-prompt">
            <p>Enter a customer code above and click <strong>Get Reorder Suggestions</strong><br>to view reorder patterns and smart cart suggestions.</p>
        </div>

    </div>
</div>

<script>
    function getDemoPredictiveData() {
        return {
            total_items_analyzed: 12,
            total_suggestions: 5,
            suggestions: [
                {
                    type: 'usual_reorder',
                    priority: 'high',
                    message: 'Add your usual coffee beans to your cart',
                    reason: 'Customer orders coffee weekly and is currently overdue.',
                    item_code: 'BEV-001',
                    item_name: 'Premium Arabica Coffee Beans 500g',
                    days_since_last_order: 14,
                    avg_interval: 7
                },
                {
                    type: 'low_stock',
                    priority: 'medium',
                    message: 'Stock running low on pasta',
                    reason: 'Current stock is below the customer average purchase quantity.',
                    item_code: 'FOOD-004',
                    item_name: 'Whole Wheat Spaghetti 500g',
                    current_stock: 5,
                    stock_threshold: 12
                }
            ],
            customer_info: {
                card_name: 'Emily Rodriguez',
                card_code: 'C12345',
                customer_type: 'sap',
                country: 'United States'
            }
        };
    }

    async function getPredictions() {
        const customerId = document.getElementById('customerId').value.trim();
        const demoMode = document.getElementById('demoModePredictive')?.checked;

        if (!customerId && !demoMode) {
            alert('Please enter a customer ID');
            return;
        }

        showLoading();

        try {
            let data;
            if (demoMode) {
                data = getDemoPredictiveData();
            } else {
                const response = await fetch(`/api/predictive/${customerId}`);
                data = await response.json();
            }

            if (data.success === false) {
                showError(data.message);
            } else {
                displayResults(data.predictions || data);
            }
        } catch (error) {
            showError('Failed to fetch predictions: ' + error.message);
        }
    }

    function displayResults(predictions) {
        hideLoading();
        document.getElementById('emptyPrompt').style.display = 'none';

        const statsDiv = document.getElementById('stats');
        const customerInfoDiv = document.getElementById('customerInfo');
        const suggestionsDiv = document.getElementById('suggestions');
        const patternsContentDiv = document.getElementById('patternsContent');

        // Stats
        statsDiv.innerHTML = `
            <div class="stat-card">
                <div class="stat-number">${predictions.total_items_analyzed}</div>
                <div class="stat-label">Items Analyzed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${predictions.total_suggestions}</div>
                <div class="stat-label">Suggestions</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${predictions.suggestions.filter(s => s.priority === 'high').length}</div>
                <div class="stat-label">High Priority</div>
            </div>
        `;

        // Customer info
        const c = predictions.customer_info;
        customerInfoDiv.innerHTML = `
            <h3>Customer</h3>
            <p><strong>Name: </strong>${c.card_name || 'N/A'}</p>
            <p><strong>ID: </strong>${c.card_code || 'N/A'}</p>
            <p><strong>Type: </strong>${c.customer_type || 'N/A'}</p>
            <p><strong>Country: </strong>${c.country || 'N/A'}</p>
        `;

        // Suggestions
        suggestionsDiv.innerHTML = '';
        if (predictions.suggestions && predictions.suggestions.length > 0) {
            const grouped = {};
            predictions.suggestions.forEach(s => {
                if (!grouped[s.type]) grouped[s.type] = [];
                grouped[s.type].push(s);
            });

            const categoryNames = {
                'usual_reorder': 'Usual Reorder Suggestions',
                'low_stock': 'Low Stock Alerts'
            };

            Object.keys(grouped).forEach(type => {
                const items = grouped[type];
                const name = categoryNames[type] || type.replace('_', ' ');
                suggestionsDiv.innerHTML += `
                    <div class="suggestion-category">
                        <h4>${name} <span style="color:#94a3b8;font-weight:400">(${items.length})</span></h4>
                        <div class="suggestions-grid">
                            ${items.map(s => `
                                <div class="suggestion-card ${s.priority}">
                                    <div class="suggestion-header">
                                        <div class="suggestion-message">${s.message}</div>
                                        <div class="suggestion-type">${s.type.replace('_', ' ').toUpperCase()}</div>
                                    </div>
                                    <div class="suggestion-reason">${s.reason}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        } else {
            suggestionsDiv.innerHTML = `
                <div class="suggestion-category">
                    <div class="suggestion-card">
                        <div class="suggestion-header">
                            <div class="suggestion-message">No Recent Patterns Found</div>
                            <div class="suggestion-type">INFO</div>
                        </div>
                        <div class="suggestion-reason">
                            No suggestions available — no orders in the past year, or no consistent ordering patterns detected.
                        </div>
                    </div>
                </div>
            `;
        }

        // Patterns table
        if (predictions.patterns && Object.keys(predictions.patterns).length > 0) {
            const sorted = Object.entries(predictions.patterns).sort((a, b) =>
                new Date(b[1].last_order_date) - new Date(a[1].last_order_date)
            );

            patternsContentDiv.innerHTML = `
                <table class="patterns-table">
                    <thead>
                        <tr>
                            <th>Item Code</th>
                            <th>Item Name</th>
                            <th style="text-align:center">Avg Interval (days)</th>
                            <th style="text-align:center">Avg Qty</th>
                            <th>Avg Price</th>
                            <th style="text-align:center">Stock</th>
                            <th style="text-align:center">Orders</th>
                            <th style="text-align:center">Last Order</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sorted.map(([code, p]) => {
                            let sc = '', st = p.current_stock;
                            if (p.current_stock < 0) { sc = 'stock-negative'; st = `⚠ ${p.current_stock}`; }
                            else if (p.current_stock < p.avg_quantity) { sc = 'stock-low'; st = `▼ ${p.current_stock}`; }
                            else if (p.current_stock < p.avg_quantity * 2) { sc = 'stock-medium'; st = `~ ${p.current_stock}`; }
                            else { sc = 'stock-good'; st = `✓ ${p.current_stock}`; }
                            return `
                                <tr>
                                    <td class="item-code">${code}</td>
                                    <td class="item-name">${p.item_name || 'Unknown'}</td>
                                    <td class="interval-data">${p.avg_interval}</td>
                                    <td class="quantity-data">${p.avg_quantity.toFixed(1)}</td>
                                    <td class="price-data">$${p.avg_price ? p.avg_price.toFixed(2) : '0.00'}</td>
                                    <td class="stock-data ${sc}">${st}</td>
                                    <td class="quantity-data">${p.total_orders}</td>
                                    <td class="date-data">${new Date(p.last_order_date).toLocaleDateString()}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
            window.currentPatternsData = predictions.patterns;
            window.currentCustomerInfo = predictions.customer_info;
        } else {
            patternsContentDiv.innerHTML = '<p style="font-size:0.85rem;color:#64748b;">No patterns found for this customer.</p>';
            window.currentPatternsData = null;
        }

        document.getElementById('results').style.display = 'flex';
    }

    function showLoading() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('results').style.display = 'none';
        document.getElementById('error').style.display = 'none';
    }

    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }

    function showError(message) {
        hideLoading();
        document.getElementById('error').innerHTML = `<strong>Error:</strong> ${message}`;
        document.getElementById('error').style.display = 'block';
        document.getElementById('results').style.display = 'none';
    }

    document.getElementById('customerId').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') getPredictions();
    });

    function exportPatternsToCSV() {
        if (!window.currentPatternsData) { alert('No patterns data available to export'); return; }

        const ci = window.currentCustomerInfo;
        const sorted = Object.entries(window.currentPatternsData).sort((a, b) =>
            new Date(b[1].last_order_date) - new Date(a[1].last_order_date)
        );

        let csv = 'data:text/csv;charset=utf-8,';
        csv += 'Customer ID,Customer Name,Customer Type,Country,Item Code,Item Name,Avg Interval (days),Avg Qty,Avg Price,Stock,Total Orders,Last Order\n';
        sorted.forEach(([code, p]) => {
            const row = [
                ci.card_code || 'N/A', ci.card_name || 'N/A', ci.customer_type || 'N/A', ci.country || 'N/A',
                code, p.item_name || 'Unknown', p.avg_interval, p.avg_quantity.toFixed(1),
                p.avg_price ? p.avg_price.toFixed(2) : '0.00', p.current_stock, p.total_orders,
                new Date(p.last_order_date).toLocaleDateString()
            ];
            csv += row.map(f => `"${f}"`).join(',') + '\n';
        });

        const link = document.createElement('a');
        link.setAttribute('href', encodeURI(csv));
        link.setAttribute('download', `patterns_${ci.card_code || 'customer'}_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
